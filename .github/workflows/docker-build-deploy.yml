name: Build & Deploy Gemma-4-31B to RunPod

on:
  push:
    branches: [main]
    paths:
      - "handler.py"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/docker-build-deploy.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/corecomai/gemma-4-31b-runpod:latest
            ghcr.io/corecomai/gemma-4-31b-runpod:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.RUNPOD_TEMPLATE_ID != '' }}

    steps:
      - name: Update RunPod template to new image digest
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          IMAGE_DIGEST: ${{ needs.build.outputs.digest }}
          TEMPLATE_ID: ${{ vars.RUNPOD_TEMPLATE_ID }}
        run: |
          IMAGE="ghcr.io/corecomai/gemma-4-31b-runpod@${IMAGE_DIGEST}"
          echo "Deploying image: $IMAGE"

          RESPONSE=$(curl -s "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { saveTemplate(input: { id: \\\"${TEMPLATE_ID}\\\", name: \\\"gemma-4-31b-runpod\\\", imageName: \\\"${IMAGE}\\\", containerDiskInGb: 50, volumeInGb: 0, dockerArgs: \\\"\\\", isServerless: true, env: [ { key: \\\"MODEL_NAME\\\", value: \\\"google/gemma-4-31b-it\\\" }, { key: \\\"QUANTIZATION\\\", value: \\\"None\\\" }, { key: \\\"TENSOR_PARALLEL_SIZE\\\", value: \\\"1\\\" }, { key: \\\"MAX_MODEL_LEN\\\", value: \\\"40000\\\" }, { key: \\\"GPU_MEMORY_UTILIZATION\\\", value: \\\"0.85\\\" }, { key: \\\"MAX_NUM_SEQS\\\", value: \\\"64\\\" }, { key: \\\"VLLM_WORKER_MULTIPROC_METHOD\\\", value: \\\"spawn\\\" }, { key: \\\"HF_TOKEN\\\", value: \\\"{{ RUNPOD_SECRET_HF_TOKEN }}\\\" } ] }) { id name imageName } }\"
            }")

          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if 'errors' in d:
              print('ERROR:', d['errors']); exit(1)
          print('✅ Deployed:', d['data']['saveTemplate']['imageName'])
          "

  update-pod:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.RUNPOD_POD_ID != '' }}

    steps:
      - name: Update RunPod Pod container image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          POD_ID: ${{ vars.RUNPOD_POD_ID }}
        run: |
          IMAGE="ghcr.io/corecomai/gemma-4-31b-runpod:latest"
          echo "Updating Pod ${POD_ID} to image: ${IMAGE}"

          RESPONSE=$(curl -s "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation { podUpdateContainerImage(input: { podId: \\\"${POD_ID}\\\", imageName: \\\"${IMAGE}\\\" }) { id imageName } }\"
            }")

          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if 'errors' in d:
              print('⚠️  Pod update skipped (variable not set)'); exit(0)
          print('✅ Pod image updated:', d['data']['podUpdateContainerImage']['imageName'])
          " || true
