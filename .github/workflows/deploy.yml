name: Deploy to RunPod

on:
  push:
    branches: [main]
    paths:
      - 'handler.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lint Python files
        run: |
          python -m py_compile handler.py
          python -m py_compile test_endpoint.py
          python -m py_compile example_integration.py

      - name: Build Docker image
        run: |
          docker build -t gemma4-runpod:${{ github.sha }} .
          docker tag gemma4-runpod:${{ github.sha }} gemma4-runpod:latest

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag gemma4-runpod:latest ${{ secrets.DOCKER_USERNAME }}/gemma4-runpod:latest
          docker tag gemma4-runpod:latest ${{ secrets.DOCKER_USERNAME }}/gemma4-runpod:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gemma4-runpod:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gemma4-runpod:${{ github.sha }}
          echo "✅ Docker image pushed to DockerHub"

      - name: Deploy to RunPod (Manual Step)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "✅ Docker image ready for RunPod deployment"
          echo "🔗 Update your RunPod endpoint with:"
          echo "   Image: ${{ secrets.DOCKER_USERNAME }}/gemma4-runpod:latest"
          echo ""
          echo "📝 Instructions:"
          echo "1. Go to: https://www.runpod.io/console/serverless"
          echo "2. Update your endpoint image to: ${{ secrets.DOCKER_USERNAME }}/gemma4-runpod:latest"
          echo "3. Deploy"

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Docker Image: `${{ secrets.DOCKER_USERNAME }}/gemma4-runpod:${{ github.sha }}`

            Deploy to RunPod with:
            - Image: ${{ secrets.DOCKER_USERNAME }}/gemma4-runpod:latest
            - GPU: A100 80GB
            - Environment Variables (see README.md)
          draft: false
          prerelease: false
